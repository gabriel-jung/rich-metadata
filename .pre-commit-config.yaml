repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-yaml
      - id: check-toml
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-added-large-files

  - repo: https://github.com/astral-sh/uv-pre-commit
    rev: 0.11.1
    hooks:
      - id: uv-lock

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.7
    hooks:
      - id: ruff-check
        name: ruff fix
        args: [--fix]
        types_or: [python, pyi]

      - id: ruff-format
        name: ruff format
        types_or: [python, pyi]

      - id: ruff-check
        name: ruff check
        args: [--output-format, concise]
        types_or: [python, pyi]
